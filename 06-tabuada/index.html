<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabuada</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer ></script>
</head>

<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Tabuada</h1>
    <p>Informe um número para gerar sua tabuada completa.</p>

    <div class="campo">
      <label>Número</label>
      <input type="number" id="numero" placeholder="Ex: 7" />
    </div>

    <button  onclick="GerarTabuada()">Gerar Tabuada</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <table>
        <thead>
          <tr>
            <th>Expressão</th>
            <th>Resultado</th>
          </tr>
        </thead>
        <tbody id="corpo-tabela">
          <tr>
            <td>7 x 1</td>
            <td>7</td>
          </tr>
          <tr>
            <td>7 x 2</td>
            <td>14</td>
          </tr>
          <tr>
            <td>7 x 3</td>
            <td>21</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

</body>

</html>
